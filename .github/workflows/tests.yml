name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run tests (Maven)
        run: |
          if [ -f mvnw ]; then chmod +x mvnw && ./mvnw -B test; else mvn -B test; fi
